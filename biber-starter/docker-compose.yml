services:
  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    container_name: biber-api
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app/app
      - ./models:/models
      - ./storage:/storage
    depends_on:
      - mysql
      - redis
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build:
      context: .
      dockerfile: docker/worker.Dockerfile
    container_name: biber-worker
    env_file:
      - .env
    volumes:
      - ./worker:/worker/worker
      - ./models:/models
      - ./storage:/storage
    depends_on:
      - redis
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    command: python -m worker.main

  mysql:
    image: mysql:8.0
    container_name: biber-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql

  redis:
    image: redis:7
    container_name: biber-redis
    ports:
      - "6379:6379"

  adminer:
    image: adminer
    container_name: biber-adminer
    ports:
      - "8080:8080"
    depends_on:
      - mysql

volumes:
  mysql_data:
