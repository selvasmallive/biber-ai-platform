services:
  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    container_name: biber-api
    env_file:
      - path: .env
        required: false
    environment:
      BIBER_LOCAL_MODEL_BASE_URL: http://biber-dev-core:8000/v1
      BIBER_LOCAL_MODEL_NAME: biber-dev-core
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app/app
      - ./models:/models
      - ./storage:/storage
    depends_on:
      - mysql
      - redis
      - biber-dev-core
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  biber-dev-core:
    image: vllm/vllm-openai:latest
    container_name: biber-dev-core
    command:
      - --model
      - ${BIBER_HF_MODEL:-Qwen/Qwen2.5-Coder-7B-Instruct}
      - --served-model-name
      - biber-dev-core
      - --host
      - 0.0.0.0
      - --port
      - "8000"
    environment:
      HF_TOKEN: ${HF_TOKEN:-}
    ipc: host
    ports:
      - "8001:8000"
    volumes:
      - hf_cache:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: docker/worker.Dockerfile
    container_name: biber-worker
    env_file:
      - path: .env
        required: false
    volumes:
      - ./worker:/worker/worker
      - ./models:/models
      - ./storage:/storage
    depends_on:
      - redis
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    command: python -m worker.main

  mysql:
    image: mysql:8.0
    container_name: biber-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-change-me-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-biber}
      MYSQL_USER: ${MYSQL_USER:-biber}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-change-me-biber}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql

  redis:
    image: redis:7
    container_name: biber-redis
    ports:
      - "6379:6379"

  adminer:
    image: adminer
    container_name: biber-adminer
    ports:
      - "8080:8080"
    depends_on:
      - mysql

  postgres:
    image: postgres:16
    container_name: xriq-postgres
    environment:
      POSTGRES_DB: ${XRIQ_POSTGRES_DB:-xriq_private_dev}
      POSTGRES_USER: ${XRIQ_POSTGRES_USER:-xriq}
      POSTGRES_PASSWORD: ${XRIQ_POSTGRES_PASSWORD:-xriq-local-dev-password}
    ports:
      - "5433:5432"
    volumes:
      - xriq_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${XRIQ_POSTGRES_USER:-xriq} -d ${XRIQ_POSTGRES_DB:-xriq_private_dev}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql_data:
  hf_cache:
  xriq_postgres_data:
