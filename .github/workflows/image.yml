name: Image

# Build the XRIQ deploy container image so the Dockerfile and the release build
# cannot silently break between deployments. Runs only when the xriq workspace or
# this workflow changes (a full release build is slow), plus on manual dispatch.
# It builds only; it does not push or deploy.

on:
  push:
    branches: [main]
    paths:
      - "xriq/**"
      - ".github/workflows/image.yml"
  pull_request:
    paths:
      - "xriq/**"
      - ".github/workflows/image.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: image-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build XRIQ container image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image (no push)
        run: docker build -t xriq:ci xriq
